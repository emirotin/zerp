<!-- Interactive frequency table analysis -->
<div class="slide">
  <div class="block-label">Part 4 · Interactive</div>
  <div class="interactive-badge">🎯 INTERACTIVE</div>
  <h2>Find the biased wheel</h2>
  <p style="font-size: 1.05em; color: var(--zerp-text); text-align: center; margin-bottom: 8px">
    1,000 spins. Expected frequency =
    <span
      style="
        font-family: &quot;Roboto Mono&quot;, monospace;
        color: var(--zerp-accent);
        font-weight: 700;
        font-size: 1.1em;
      "
      >1000/37 ≈ 27</span
    >. Which numbers look suspicious?
  </p>
  <div id="freq-table" style="margin: 8px 0"></div>
  <div
    id="freq-status"
    style="text-align: center; margin-top: 8px; font-size: 1.1em; color: var(--zerp-text)"
  >
    Press ↓ to highlight anomalies
  </div>
  <p
    id="freq-hint"
    style="
      text-align: center;
      color: var(--zerp-muted);
      font-size: 1em;
      font-weight: 700;
      margin-top: 6px;
    "
  >
    ↓ highlight anomalies
  </p>

  <script>
    (function () {
      var slide = document.currentScript.closest(".slide");
      var step = 0;
      var data = [
        [0, 25],
        [1, 29],
        [2, 23],
        [3, 26],
        [4, 31],
        [5, 28],
        [6, 24],
        [7, 27],
        [8, 39],
        [9, 30],
        [10, 22],
        [11, 26],
        [12, 28],
        [13, 28],
        [14, 26],
        [15, 30],
        [16, 41],
        [17, 22],
        [18, 25],
        [19, 16],
        [20, 29],
        [21, 27],
        [22, 24],
        [23, 32],
        [24, 17],
        [25, 27],
        [26, 24],
        [27, 42],
        [28, 31],
        [29, 26],
        [30, 28],
        [31, 24],
        [32, 44],
        [33, 26],
        [34, 23],
        [35, 29],
        [36, 25],
      ];
      var highThresh = 37;
      var lowThresh = 19;

      function render() {
        var cols = 3;
        var perCol = Math.ceil(data.length / cols);
        var html =
          '<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px 24px; max-width: 750px; margin: 0 auto; font-family: Roboto Mono, monospace; font-size: 0.95em">';

        for (var c = 0; c < cols; c++) {
          html +=
            '<div style="display: flex; justify-content: space-between; padding: 2px 8px; border-bottom: 1px solid var(--zerp-border); color: var(--zerp-muted); font-size: 1em"><span>Number</span><span>Frequency</span></div>';
        }

        for (var r = 0; r < perCol; r++) {
          for (var c = 0; c < cols; c++) {
            var idx = r + c * perCol;
            if (idx >= data.length) {
              html += "<div></div>";
              continue;
            }
            var num = data[idx][0];
            var freq = data[idx][1];
            var isHigh = freq >= highThresh;
            var isLow = freq <= lowThresh;
            var bg = "transparent";
            var color = "var(--zerp-text)";
            var weight = "400";
            if (step >= 1) {
              if (isHigh) {
                bg = "var(--zerp-red-tint)";
                color = "var(--zerp-red)";
                weight = "900";
              } else if (isLow) {
                bg = "var(--zerp-blue-tint)";
                color = "var(--zerp-accent)";
                weight = "700";
              }
            }
            html +=
              '<div style="display: flex; justify-content: space-between; padding: 2px 8px; background: ' +
              bg +
              "; border-radius: 4px; color: " +
              color +
              "; font-weight: " +
              weight +
              '"><span>' +
              num +
              "</span><span>" +
              freq +
              (step >= 1 && isHigh ? " ⚠" : "") +
              (step >= 1 && isLow ? " ▼" : "") +
              "</span></div>";
          }
        }
        html += "</div>";
        slide.querySelector("#freq-table").innerHTML = html;

        var status = slide.querySelector("#freq-status");
        var hint = slide.querySelector("#freq-hint");
        if (step === 0) {
          status.innerHTML = "Study the table. Which numbers stand out?";
          hint.innerHTML = "↓ highlight anomalies";
          hint.style.visibility = "visible";
        } else if (step === 1) {
          status.innerHTML =
            '<span style="color: var(--zerp-red); font-weight: 700">High ⚠:</span> 8 (39), 16 (41), 27 (42), 32 (44) &nbsp; <span style="color: var(--zerp-accent); font-weight: 700">Low ▼:</span> 19 (16), 24 (17)';
          hint.innerHTML = "↓ explanation";
        } else {
          status.innerHTML =
            '<span style="color: var(--zerp-green)">On the real wheel, numbers 8, 16, 27, and 32 were <strong>next to each other</strong>. That means one zone of the wheel was biased.</span>';
          hint.style.visibility = "hidden";
        }
      }

      slide.addEventListener("slide-next", function () {
        if (step < 2) {
          step++;
          render();
        }
      });
      slide.addEventListener("slide-prev", function () {
        if (step > 0) {
          step--;
          render();
        }
      });

      render();
    })();
  </script>
</div>
