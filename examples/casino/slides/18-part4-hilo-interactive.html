<!-- Interactive card counting practice -->
<div class="slide">
  <div class="block-label">Part 4 · Interactive</div>
  <div class="interactive-badge">🎯 INTERACTIVE</div>
  <h2>Let's practice counting</h2>
  <p class="xl center">Keep the Hi-Lo running count. Start from zero.</p>

  <div class="stat-row" style="align-items: flex-start; margin: 10px 0">
    <div class="stat">
      <div class="label" style="margin-bottom: 4px">Running count</div>
      <div id="hilo-count" class="value">0</div>
    </div>
    <div class="stat">
      <div class="label" style="margin-bottom: 4px">Cards dealt</div>
      <div id="hilo-dealt" class="value muted">0 / 15</div>
    </div>
  </div>

  <div id="hilo-cards" class="row" style="gap: 6px; margin: 12px 0; min-height: 90px"></div>

  <div id="hilo-current" class="center xl" style="min-height: 44px; margin: 8px 0"></div>

  <div class="center" data-step="15">
    <div class="key-thought edge-green">
      <p class="green">
        Count is +5. The deck has lots of big cards left, so this is a favorable betting moment.
      </p>
    </div>
  </div>
  <p class="step-hint" data-until-step="15">↓ deal the next card</p>

  <script>
    (function () {
      var slide = document.currentScript.closest(".slide");
      var sequence = [
        { card: "5", suit: "♠", val: +1 },
        { card: "K", suit: "♥", val: -1 },
        { card: "3", suit: "♦", val: +1 },
        { card: "7", suit: "♣", val: 0 },
        { card: "2", suit: "♠", val: +1 },
        { card: "6", suit: "♥", val: +1 },
        { card: "A", suit: "♠", val: -1 },
        { card: "4", suit: "♦", val: +1 },
        { card: "10", suit: "♣", val: -1 },
        { card: "9", suit: "♥", val: 0 },
        { card: "3", suit: "♣", val: +1 },
        { card: "5", suit: "♦", val: +1 },
        { card: "6", suit: "♠", val: +1 },
        { card: "J", suit: "♦", val: -1 },
        { card: "2", suit: "♥", val: +1 },
      ];
      var step = 0;

      function suitClass(suit) {
        return suit === "♥" || suit === "♦" ? "suit-red" : "";
      }

      function valClass(v) {
        return v > 0 ? "green" : v < 0 ? "red" : "muted";
      }

      function valText(v) {
        return v > 0 ? "+1" : v < 0 ? "−1" : "0";
      }

      function render() {
        var count = 0;
        var cardsHtml = "";
        for (var i = 0; i < step; i++) {
          count += sequence[i].val;
          var c = sequence[i];
          var isCurrent = i === step - 1;
          cardsHtml += '<div class="hilo-card' + (isCurrent ? " current" : "") + '">';
          cardsHtml += '<div class="rank ' + suitClass(c.suit) + '">' + c.card + c.suit + "</div>";
          cardsHtml += '<div class="delta ' + valClass(c.val) + '">' + valText(c.val) + "</div>";
          cardsHtml += "</div>";
        }
        slide.querySelector("#hilo-cards").innerHTML = cardsHtml;

        var countClass = count > 0 ? "green" : count < 0 ? "red" : "accent";
        var countSign = count > 0 ? "+" : "";
        var countEl = slide.querySelector("#hilo-count");
        countEl.textContent = countSign + count;
        countEl.className = "value " + countClass;
        slide.querySelector("#hilo-dealt").textContent = step + " / " + sequence.length;

        var currentEl = slide.querySelector("#hilo-current");
        if (step > 0 && step <= sequence.length) {
          var last = sequence[step - 1];
          currentEl.innerHTML =
            '<span class="mono ' +
            (suitClass(last.suit) || "") +
            '" style="font-weight: 700">' +
            last.card +
            last.suit +
            '</span> → <span class="' +
            valClass(last.val) +
            '">' +
            valText(last.val) +
            '</span> → count = <span class="' +
            countClass +
            '" style="font-weight: 900">' +
            countSign +
            count +
            "</span>";
        } else {
          currentEl.innerHTML = "";
        }
      }

      slide.addEventListener("slide-next", function () {
        if (step < sequence.length) {
          step++;
          render();
        }
      });
      slide.addEventListener("slide-prev", function () {
        if (step > 0) {
          step--;
          render();
        }
      });

      render();
    })();
  </script>
</div>

<style>
  .hilo-card {
    background: var(--zerp-surface);
    border: 2px solid var(--zerp-border);
    border-radius: 8px;
    padding: 6px 14px;
    min-width: 70px;
    text-align: center;
  }
  .hilo-card.current {
    background: var(--zerp-orange-tint);
    border-color: var(--zerp-orange-solid);
  }
  .hilo-card .rank {
    font-size: 1.82em;
    font-weight: 700;
    font-family: "Roboto Mono", monospace;
  }
  .suit-red {
    color: var(--zerp-red);
  }
  .hilo-card .delta {
    font-size: 1.32em;
  }
</style>
