<!-- Interactive card counting practice -->
<div class="slide">
  <div class="block-label">Part 4 · Interactive</div>
  <div class="interactive-badge">🎯 INTERACTIVE</div>
  <h2>Let's practice counting</h2>
  <p class="xl center">Keep the Hi-Lo running count. Start from zero.</p>

  <div class="stat-row" style="align-items: flex-start; margin: 10px 0">
    <div class="stat">
      <div class="label" style="margin-bottom: 4px">Running count</div>
      <div id="hilo-count" class="value">0</div>
    </div>
    <div class="stat">
      <div class="label" style="margin-bottom: 4px">Cards dealt</div>
      <div id="hilo-dealt" class="value" style="color: var(--zerp-muted)">0 / 15</div>
    </div>
  </div>

  <div id="hilo-cards" class="row" style="gap: 6px; margin: 12px 0; min-height: 90px"></div>

  <div id="hilo-current" class="center xl" style="min-height: 44px; margin: 8px 0"></div>

  <div id="hilo-verdict" class="center" style="margin-top: 8px" hidden>
    <div class="key-thought" style="border-color: var(--zerp-green)">
      <p class="green">
        Count is +5. The deck has lots of big cards left, so this is a favorable betting moment.
      </p>
    </div>
  </div>
  <p id="hilo-hint" class="caption" style="margin-top: 6px">↓ deal the next card</p>

  <script>
    (function () {
      var slide = document.currentScript.closest(".slide");
      var sequence = [
        { card: "5", suit: "♠", val: +1 },
        { card: "K", suit: "♥", val: -1 },
        { card: "3", suit: "♦", val: +1 },
        { card: "7", suit: "♣", val: 0 },
        { card: "2", suit: "♠", val: +1 },
        { card: "6", suit: "♥", val: +1 },
        { card: "A", suit: "♠", val: -1 },
        { card: "4", suit: "♦", val: +1 },
        { card: "10", suit: "♣", val: -1 },
        { card: "9", suit: "♥", val: 0 },
        { card: "3", suit: "♣", val: +1 },
        { card: "5", suit: "♦", val: +1 },
        { card: "6", suit: "♠", val: +1 },
        { card: "J", suit: "♦", val: -1 },
        { card: "2", suit: "♥", val: +1 },
      ];
      var step = 0;

      function cardColor(suit) {
        return suit === "♥" || suit === "♦" ? "var(--zerp-red)" : "var(--zerp-text)";
      }

      function valColor(v) {
        return v > 0 ? "var(--zerp-green)" : v < 0 ? "var(--zerp-red)" : "var(--zerp-muted)";
      }

      function valText(v) {
        return v > 0 ? "+1" : v < 0 ? "−1" : "0";
      }

      function render() {
        var count = 0;
        var cardsHtml = "";
        for (var i = 0; i < step; i++) {
          count += sequence[i].val;
          var c = sequence[i];
          var isCurrent = i === step - 1;
          var border = isCurrent ? "var(--zerp-orange-solid)" : "var(--zerp-border)";
          var bg = isCurrent ? "var(--zerp-orange-tint)" : "var(--zerp-surface)";
          cardsHtml +=
            '<div style="background: ' +
            bg +
            "; border: 2px solid " +
            border +
            '; border-radius: 8px; padding: 6px 14px; min-width: 70px; text-align: center">';
          cardsHtml +=
            '<div style="font-size: 1.82em; font-weight: 700; color: ' +
            cardColor(c.suit) +
            '; font-family: Roboto Mono, monospace">' +
            c.card +
            c.suit +
            "</div>";
          cardsHtml +=
            '<div style="font-size: 1.32em; font-weight: 700; color: ' +
            valColor(c.val) +
            '">' +
            valText(c.val) +
            "</div>";
          cardsHtml += "</div>";
        }
        slide.querySelector("#hilo-cards").innerHTML = cardsHtml;

        var countColor =
          count > 0 ? "var(--zerp-green)" : count < 0 ? "var(--zerp-red)" : "var(--zerp-accent)";
        var countSign = count > 0 ? "+" : "";
        slide.querySelector("#hilo-count").textContent = countSign + count;
        slide.querySelector("#hilo-count").style.color = countColor;
        slide.querySelector("#hilo-dealt").textContent = step + " / " + sequence.length;

        var currentEl = slide.querySelector("#hilo-current");
        if (step > 0 && step <= sequence.length) {
          var last = sequence[step - 1];
          currentEl.innerHTML =
            '<span style="color: ' +
            cardColor(last.suit) +
            '; font-weight: 700">' +
            last.card +
            last.suit +
            '</span> → <span style="color: ' +
            valColor(last.val) +
            '; font-weight: 700">' +
            valText(last.val) +
            '</span> → count = <span style="color: ' +
            countColor +
            '; font-weight: 900">' +
            countSign +
            count +
            "</span>";
        } else {
          currentEl.innerHTML = "";
        }

        slide.querySelector("#hilo-verdict").hidden = step < sequence.length;
        slide.querySelector("#hilo-hint").hidden = step >= sequence.length;
      }

      slide.addEventListener("slide-next", function () {
        if (step < sequence.length) {
          step++;
          render();
        }
      });
      slide.addEventListener("slide-prev", function () {
        if (step > 0) {
          step--;
          render();
        }
      });

      render();
    })();
  </script>
</div>
